services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: synaptic-qdrant
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "6333:6333"
    deploy:
      resources:
        limits:
          memory: 1G

  api:
    build: ./api
    container_name: synaptic-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    env_file: .env
    depends_on:
      - qdrant
    deploy:
      resources:
        limits:
          memory: 1G

